<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · Room Expense Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* same styles as before, no changes needed */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #f0f3f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .login-container, .admin-container { background: white; border-radius: 2rem; padding: 2rem; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1); }
    .admin-container { max-width: 1400px; display: none; }
    .input-group { margin-bottom: 1rem; text-align: left; }
    .input-group label { font-size: 0.75rem; font-weight: 600; color: #547190; display: block; margin-bottom: 0.3rem; }
    .input-group input { width: 100%; padding: 0.8rem; border: 1.5px solid #e1eaf1; border-radius: 60px; font-size: 1rem; }
    .btn { background: #1e3a5f; color: white; border: none; padding: 0.8rem; width: 100%; border-radius: 60px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    .btn-secondary { background: #e2e8f0; color: #1e3349; }
    .otp-section { display: none; margin-top: 1rem; }
    .error-msg { color: #c2410c; font-size: 0.8rem; margin-top: 0.5rem; }
    .success-msg { color: #15803d; font-size: 0.8rem; margin-top: 0.5rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: 1.2rem; padding: 1.2rem; border: 1px solid #e2e9f2; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: #0f263f; }
    .expense-table { background: white; border-radius: 1.5rem; overflow-x: auto; border: 1px solid #e2e9f2; margin-bottom: 2rem; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #edf2f7; }
    th { background: #f8fafd; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 0.3rem; }
    .btn-edit { color: #2b6a9f; }
    .btn-delete { color: #c2410c; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 500px; width: 90%; }
    .logout-btn { background: #e2e8f0; color: #1e3a5f; padding: 0.5rem 1rem; border-radius: 40px; cursor: pointer; margin-left: 0.5rem; }
    .footer-note { text-align: center; font-size: 0.8rem; color: #8a99b0; margin-top: 2rem; }
    @media (max-width: 768px) { .stat-value { font-size: 1.4rem; } }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="login-container">
    <h2><i class="fas fa-lock"></i> Admin Access</h2>
    <p>Authorized number: <strong>+916003447530</strong></p>
    <div class="input-group">
      <label>Phone Number</label>
      <input type="tel" id="phoneNumber" value="+916003447530" readonly>
    </div>
    <button id="sendOtpBtn" class="btn">Send OTP</button>
    <div id="otpSection" class="otp-section">
      <div class="input-group">
        <label>Enter OTP</label>
        <input type="text" id="otpCode" placeholder="6-digit code">
      </div>
      <button id="verifyOtpBtn" class="btn">Verify & Login</button>
      <div id="loginError" class="error-msg"></div>
      <div id="loginSuccess" class="success-msg"></div>
    </div>
  </div>

  <!-- Admin Dashboard (hidden initially) -->
  <div id="adminDashboard" class="admin-container">
    <div class="admin-header" style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
      <h1><i class="fas fa-user-shield"></i> Admin Dashboard</h1>
      <div>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        <a href="index.html" style="margin-left: 0.5rem; text-decoration: none; background: #e2e8f0; padding: 0.5rem 1rem; border-radius: 40px; color: #1e3a5f;">← Back to Tracker</a>
      </div>
    </div>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value" id="totalSpent">₹0</div></div>
      <div class="stat-card"><div class="stat-label">Total Expenses</div><div class="stat-value" id="totalCount">0</div></div>
      <div class="stat-card"><div class="stat-label">Most Active Payer</div><div class="stat-value" id="topPayer">—</div></div>
      <div class="stat-card"><div class="stat-label">Top Category</div><div class="stat-value" id="topCategory">—</div></div>
    </div>
    <div class="expense-table">
      <table><thead><tr><th>Date</th><th>Description</th><th>Amount (₹)</th><th>Payer</th><th>Receipt</th><th>Actions</th></tr></thead><tbody id="expenseTableBody"><tr><td colspan="6">Loading...</td></tr></tbody></table>
    </div>
    <div class="footer-note">⚠️ Admin actions are permanent.</div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3>Edit Expense</h3>
      <input type="hidden" id="editId">
      <label>Date</label><input type="date" id="editDate">
      <label>Description</label><input type="text" id="editDesc">
      <label>Amount (₹)</label><input type="number" step="0.01" id="editAmount">
      <label>Payer</label><select id="editPayer"><option value="R">Rupankar</option><option value="J">Jyotish</option><option value="K">Kishor</option><option value="G">Gogon</option></select>
      <div class="modal-actions"><button class="btn-secondary" id="closeModalBtn">Cancel</button><button class="btn-primary" id="saveEditBtn">Save Changes</button></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
    import { getDatabase, ref, onValue, update, remove } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js';
    import { getAuth, signInWithPhoneNumber, RecaptchaVerifier, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAap2GFEa6778X2v6tRj8ec-eSsR8tXYDk",
      authDomain: "project-12129cb4-c223-4008-92b.firebaseapp.com",
      databaseURL: "https://project-12129cb4-c223-4008-92b-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "project-12129cb4-c223-4008-92b",
      storageBucket: "project-12129cb4-c223-4008-92b.firebasestorage.app",
      messagingSenderId: "44587974750",
      appId: "1:44587974750:web:008b2184de87e58b3834cf",
      measurementId: "G-XNMTKQ6G8T"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // DOM elements
    const loginScreen = document.getElementById('loginScreen');
    const adminDashboard = document.getElementById('adminDashboard');
    const sendOtpBtn = document.getElementById('sendOtpBtn');
    const otpSection = document.getElementById('otpSection');
    const verifyOtpBtn = document.getElementById('verifyOtpBtn');
    const phoneInput = document.getElementById('phoneNumber');
    const otpInput = document.getElementById('otpCode');
    const loginError = document.getElementById('loginError');
    const loginSuccess = document.getElementById('loginSuccess');
    const logoutBtn = document.getElementById('logoutBtn');

    let confirmationResult = null;
    let recaptchaVerifier = null;

    function setupRecaptcha() {
      if (!recaptchaVerifier) {
        // The recaptcha container must exist. We'll use a div created dynamically.
        // But Firebase expects an existing element. Let's create one.
        let container = document.getElementById('recaptcha-container');
        if (!container) {
          container = document.createElement('div');
          container.id = 'recaptcha-container';
          container.style.position = 'absolute';
          container.style.bottom = '0';
          container.style.right = '0';
          container.style.zIndex = '-1';
          document.body.appendChild(container);
        }
        recaptchaVerifier = new RecaptchaVerifier(auth, container, {
          'size': 'invisible',
          'callback': () => {
            // reCAPTCHA solved, allow sending
          }
        });
      }
      return recaptchaVerifier;
    }

    sendOtpBtn.addEventListener('click', async () => {
      const phoneNumber = phoneInput.value.trim();
      if (!phoneNumber) {
        loginError.innerText = 'Please enter phone number';
        return;
      }
      loginError.innerText = '';
      loginSuccess.innerText = '';
      sendOtpBtn.disabled = true;
      sendOtpBtn.textContent = 'Sending...';
      try {
        const verifier = setupRecaptcha();
        const confirmation = await signInWithPhoneNumber(auth, phoneNumber, verifier);
        confirmationResult = confirmation;
        otpSection.style.display = 'block';
        loginSuccess.innerText = 'OTP sent! Check your phone.';
        sendOtpBtn.textContent = 'OTP Sent';
      } catch (error) {
        console.error('Send OTP error:', error);
        loginError.innerText = `Error: ${error.message}`;
        sendOtpBtn.disabled = false;
        sendOtpBtn.textContent = 'Send OTP';
        // If reCAPTCHA fails, maybe need to reset
        if (recaptchaVerifier) {
          recaptchaVerifier.clear();
          recaptchaVerifier = null;
        }
      }
    });

    verifyOtpBtn.addEventListener('click', async () => {
      const otp = otpInput.value.trim();
      if (!otp) {
        loginError.innerText = 'Enter OTP';
        return;
      }
      loginError.innerText = '';
      loginSuccess.innerText = '';
      verifyOtpBtn.disabled = true;
      verifyOtpBtn.textContent = 'Verifying...';
      try {
        await confirmationResult.confirm(otp);
        loginSuccess.innerText = 'Login successful!';
        loginScreen.style.display = 'none';
        adminDashboard.style.display = 'block';
        localStorage.setItem('adminLoggedIn', 'true');
      } catch (error) {
        console.error('Verify OTP error:', error);
        loginError.innerText = `Invalid OTP: ${error.message}`;
        verifyOtpBtn.disabled = false;
        verifyOtpBtn.textContent = 'Verify & Login';
      }
    });

    async function logout() {
      await signOut(auth);
      localStorage.removeItem('adminLoggedIn');
      loginScreen.style.display = 'flex';
      adminDashboard.style.display = 'none';
      otpSection.style.display = 'none';
      sendOtpBtn.disabled = false;
      sendOtpBtn.textContent = 'Send OTP';
      otpInput.value = '';
      loginError.innerText = '';
      loginSuccess.innerText = '';
      confirmationResult = null;
      if (recaptchaVerifier) {
        recaptchaVerifier.clear();
        recaptchaVerifier = null;
      }
    }
    logoutBtn.addEventListener('click', logout);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginScreen.style.display = 'none';
        adminDashboard.style.display = 'block';
        loadAdminData();
      } else {
        loginScreen.style.display = 'flex';
        adminDashboard.style.display = 'none';
      }
    });

    // Admin data
    let expenses = [];
    function formatDateShort(dateStr) {
      const d = new Date(dateStr + 'T12:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function renderTable() {
      const tbody = document.getElementById('expenseTableBody');
      if (!expenses.length) {
        tbody.innerHTML = '<tr><td colspan="6">No expenses found</td></tr>';
        return;
      }
      const sorted = [...expenses].sort((a,b) => new Date(b.date) - new Date(a.date));
      tbody.innerHTML = sorted.map(exp => `
        <tr>
          <td>${formatDateShort(exp.date)} (${exp.date})</td>
          <td>${exp.description}</td>
          <td>₹${exp.amount.toFixed(2)}</td>
          <td>${exp.paidBy}</td>
          <td>${exp.receipt ? '📎 ' + exp.receipt : '—'}</td>
          <td class="actions">
            <button class="btn-icon btn-edit" data-id="${exp.id}"><i class="fas fa-edit"></i></button>
            <button class="btn-icon btn-delete" data-id="${exp.id}"><i class="fas fa-trash-alt"></i></button>
          </td>
        </tr>
      `).join('');
      document.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.getAttribute('data-id'))));
      document.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-id');
        if (confirm('Delete this expense?')) await remove(ref(db, `expenses/${id}`));
      }));
    }

    function updateStats() {
      const totalSpent = expenses.reduce((s,e) => s+e.amount, 0);
      const totalCount = expenses.length;
      const payerCount = {}, catCount = {};
      expenses.forEach(e => { payerCount[e.paidBy] = (payerCount[e.paidBy] || 0) + 1; catCount[e.description] = (catCount[e.description] || 0) + 1; });
      let topPayer = '—', maxP = 0; for (let [p,c] of Object.entries(payerCount)) if (c>maxP) { maxP=c; topPayer=p; }
      let topCat = '—', maxC = 0; for (let [c,cnt] of Object.entries(catCount)) if (cnt>maxC) { maxC=cnt; topCat=c; }
      document.getElementById('totalSpent').innerHTML = `₹${totalSpent.toFixed(2)}`;
      document.getElementById('totalCount').innerText = totalCount;
      document.getElementById('topPayer').innerHTML = topPayer !== '—' ? `${topPayer} (${maxP})` : '—';
      document.getElementById('topCategory').innerHTML = topCat !== '—' ? `${topCat} (${maxC})` : '—';
    }

    let unsubscribe = null;
    function loadAdminData() {
      if (unsubscribe) return;
      unsubscribe = onValue(ref(db, 'expenses'), (snapshot) => {
        const data = snapshot.val();
        expenses = [];
        if (data) Object.keys(data).forEach(key => expenses.push({ id: key, ...data[key] }));
        renderTable();
        updateStats();
      }, console.error);
    }

    // Edit modal
    const modal = document.getElementById('editModal');
    const editId = document.getElementById('editId');
    const editDate = document.getElementById('editDate');
    const editDesc = document.getElementById('editDesc');
    const editAmount = document.getElementById('editAmount');
    const editPayer = document.getElementById('editPayer');
    function openEditModal(id) {
      const exp = expenses.find(e => e.id === id);
      if (!exp) return;
      editId.value = id;
      editDate.value = exp.date;
      editDesc.value = exp.description;
      editAmount.value = exp.amount;
      editPayer.value = exp.paidBy;
      modal.style.display = 'flex';
    }
    async function saveEdit() {
      const id = editId.value;
      const updated = {
        date: editDate.value,
        description: editDesc.value,
        amount: parseFloat(editAmount.value),
        paidBy: editPayer.value,
        receipt: expenses.find(e => e.id === id)?.receipt || ''
      };
      if (isNaN(updated.amount) || updated.amount <= 0) { alert('Invalid amount'); return; }
      await update(ref(db, `expenses/${id}`), updated);
      modal.style.display = 'none';
    }
    document.getElementById('closeModalBtn').addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
    document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
  </script>
</body>
</html>
